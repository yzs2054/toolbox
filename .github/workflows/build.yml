name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          Copy-Item ffmpeg_tmp/ffmpeg-*-essentials_build/bin/ffmpeg.exe .
          Copy-Item ffmpeg_tmp/ffmpeg-*-essentials_build/bin/ffprobe.exe .

      - name: Build Web EXE
        run: |
          pyinstaller --onefile `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --name toolbox-web `
            app.py

      - name: Build Desktop EXE
        run: |
          pyinstaller --onefile --noconsole `
            --add-data "desktop/style.qss;desktop" `
            --name toolbox-desktop `
            main.py

      - name: Read version
        id: ver
        shell: bash
        run: |
          v=$(python -c "from version import VERSION; print(VERSION.lstrip('v'))")
          echo "version=v$v" >> $GITHUB_OUTPUT

      - name: Package Web
        run: |
          Compress-Archive -Path dist/toolbox-web.exe,ffmpeg.exe,ffprobe.exe -DestinationPath "toolbox-${{ steps.ver.outputs.version }}-windows-web.zip"

      - name: Package Desktop
        run: |
          Compress-Archive -Path dist/toolbox-desktop.exe,ffmpeg.exe,ffprobe.exe -DestinationPath "toolbox-${{ steps.ver.outputs.version }}-windows-desktop.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            toolbox-${{ steps.ver.outputs.version }}-windows-web.zip
            toolbox-${{ steps.ver.outputs.version }}-windows-desktop.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
