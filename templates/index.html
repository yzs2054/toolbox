<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多功能工具箱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6 text-center">
      多功能工具箱
      <span id="version" class="text-sm font-normal text-gray-500"></span>
    </h1>

    <!-- Tab 导航 -->
    <div class="flex border-b border-gray-700 mb-6" id="tabs">
      <button class="tab-btn active px-5 py-2" data-tab="video">视频下载</button>
      <button class="tab-btn px-5 py-2 text-gray-500" data-tab="audio">音频提取</button>
      <button class="tab-btn px-5 py-2 text-gray-500" data-tab="system">系统</button>
    </div>

    <!-- 视频下载 Tab -->
    <div id="tab-video" class="tab-panel active">
      <div class="flex gap-2 mb-6">
        <input id="url-input" type="url" placeholder="粘贴网页链接，如微信公众号文章..."
               class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500">
        <button id="btn-extract" onclick="extractVideos()"
                class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-lg font-medium whitespace-nowrap">
          提取视频
        </button>
      </div>

      <!-- 加载状态 -->
      <div id="loading" class="hidden text-center py-8 text-gray-400">正在分析页面...</div>

      <!-- 错误提示 -->
      <div id="error" class="hidden bg-red-900/30 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4"></div>

      <!-- 视频列表 -->
      <div id="video-list" class="space-y-3"></div>

      <!-- 下载记录 -->
      <div id="task-area" class="mt-8 hidden">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-400">下载记录</h2>
          <button onclick="loadTasks()" class="text-xs text-gray-500 hover:text-gray-300">刷新</button>
        </div>
        <div id="task-list" class="space-y-3"></div>
      </div>
    </div>

    <!-- 音频提取 Tab -->
    <div id="tab-audio" class="tab-panel">
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 mb-4">
        <div class="flex items-center gap-3 flex-wrap">
          <input id="audio-file" type="file" accept="video/*" class="hidden"
                 onchange="onAudioFilePicked()">
          <button onclick="document.getElementById('audio-file').click()"
                  class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap">
            选择视频文件
          </button>
          <span id="audio-file-name" class="text-sm text-gray-400 truncate flex-1 min-w-0">未选择</span>
          <button id="btn-audio-convert" onclick="uploadAndConvert()" disabled
                  class="bg-green-600 hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap">
            开始转换
          </button>
        </div>
        <div class="text-xs text-gray-500 mt-2">上传视频文件，转为 192kbps MP3</div>
      </div>

      <div id="audio-error" class="hidden bg-red-900/30 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4"></div>

      <div id="audio-task-area" class="hidden">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-400">转换记录</h2>
          <button onclick="loadAudioTasks()" class="text-xs text-gray-500 hover:text-gray-300">刷新</button>
        </div>
        <div id="audio-task-list" class="space-y-3"></div>
      </div>
    </div>

    <!-- 系统 Tab -->
    <div id="tab-system" class="tab-panel">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-sm font-semibold text-gray-400">系统信息</h2>
        <button onclick="loadSystemInfo()" class="text-xs text-gray-500 hover:text-gray-300">刷新</button>
      </div>

      <div id="system-info" class="space-y-4 text-sm">
        <div class="text-gray-500">加载中...</div>
      </div>

      <!-- 软件更新 -->
      <div class="mt-6 pt-4 border-t border-gray-700">
        <h2 class="text-sm font-semibold text-gray-400 mb-3">软件更新</h2>
        <div id="update-status" class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <div class="text-gray-500 text-sm">检查中...</div>
        </div>
        <div id="update-progress-area" class="hidden mt-3">
          <div class="progress-bar">
            <div id="update-fill" class="progress-fill" style="width: 0%"></div>
          </div>
          <div id="update-msg" class="text-xs text-gray-500 mt-1"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
